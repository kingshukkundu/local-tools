<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Text Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl font-bold text-center text-gray-800 mb-2">OCR Text Extractor</h1>
            <p class="text-center text-gray-600 mb-8">Upload an image to extract text using LightOnOCR-2-1B</p>

            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <form id="uploadForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Upload Image</label>
                        <div 
                            id="dropZone"
                            class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-blue-500 transition-colors"
                        >
                            <input 
                                type="file" 
                                id="imageInput" 
                                accept="image/*,.heic,.heif,.pdf"
                                class="hidden"
                                required
                            >
                            <p class="text-gray-600">Drag and drop an image, HEIC, or PDF here, or click to select</p>
                        </div>
                    </div>
                    <button 
                        type="submit"
                        class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-semibold hover:bg-blue-700 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
                        id="submitBtn"
                    >
                        Extract Text
                    </button>
                </form>
            </div>

            <div id="previewSection" class="bg-white rounded-lg shadow-lg p-6 mb-6 hidden">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Image Preview</h2>
                <img id="imagePreview" class="max-w-full h-auto mx-auto rounded-lg" alt="Preview">
            </div>

            <div id="resultSection" class="bg-white rounded-lg shadow-lg p-6 hidden">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Extracted Text</h2>
                <div class="flex justify-between items-center mb-3">
                    <span id="filenameDisplay" class="text-sm text-gray-600"></span>
                    <div class="flex gap-2">
                        <button 
                            id="renderToggle"
                            class="bg-purple-600 text-white py-2 px-4 rounded-lg font-semibold hover:bg-purple-700 transition duration-200 text-sm"
                        >
                            Rendered
                        </button>
                        <button 
                            id="imageToggle"
                            class="bg-orange-600 text-white py-2 px-4 rounded-lg font-semibold hover:bg-orange-700 transition duration-200 text-sm"
                        >
                            Show Images
                        </button>
                        <button 
                            id="copyBtn"
                            class="bg-green-600 text-white py-2 px-4 rounded-lg font-semibold hover:bg-green-700 transition duration-200"
                        >
                            Copy to Clipboard
                        </button>
                    </div>
                </div>
                <div 
                    id="resultText" 
                    class="bg-gray-50 p-4 rounded-lg border border-gray-200 min-h-32 font-mono text-sm overflow-x-auto overflow-y-auto max-w-full"
                ></div>
            </div>

            <div id="errorSection" class="bg-red-50 border border-red-200 rounded-lg p-6 mb-6 hidden">
                <h2 class="text-xl font-semibold text-red-800 mb-2">Error</h2>
                <p id="errorMessage" class="text-red-600"></p>
            </div>

            <div id="loadingSection" class="bg-white rounded-lg shadow-lg p-6 hidden">
                <div class="flex items-center justify-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    <span class="ml-4 text-gray-600">Processing image... This may take a moment.</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const imageInput = document.getElementById('imageInput');
        const submitBtn = document.getElementById('submitBtn');
        const previewSection = document.getElementById('previewSection');
        const imagePreview = document.getElementById('imagePreview');
        const resultSection = document.getElementById('resultSection');
        const resultText = document.getElementById('resultText');
        const filenameDisplay = document.getElementById('filenameDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const renderToggle = document.getElementById('renderToggle');
        const imageToggle = document.getElementById('imageToggle');
        const errorSection = document.getElementById('errorSection');
        const errorMessage = document.getElementById('errorMessage');
        const loadingSection = document.getElementById('loadingSection');
        const dropZone = document.getElementById('dropZone');

        // Initialize markdown-it with HTML rendering enabled and code highlighting
        const md = window.markdownit({
            html: true,
            linkify: true,
            typographer: true,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (err) {
                        console.error('Highlight.js error:', err);
                    }
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // State variables
        let isRendered = true;
        let showImages = true;
        let extractedText = '';
        let uploadedImageData = '';

        // Handle drop zone click
        dropZone.addEventListener('click', () => {
            imageInput.click();
        });

        // Handle drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-50');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                imageInput.files = files;
                // Trigger change event
                const event = new Event('change');
                imageInput.dispatchEvent(event);
            }
        });

        // Show image preview when file is selected
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    uploadedImageData = e.target.result;
                    previewSection.classList.remove('hidden');
                    dropZone.querySelector('p').textContent = `Selected: ${file.name}`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = imageInput.files[0];
            if (!file) return;

            // Reset UI
            resultSection.classList.add('hidden');
            errorSection.classList.add('hidden');
            loadingSection.classList.remove('hidden');
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/extract', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    extractedText = data.text;
                    filenameDisplay.textContent = data.filename || 'Uploaded image';
                    resultSection.classList.remove('hidden');
                    displayResult();
                } else {
                    throw new Error(data.error || 'Failed to extract text');
                }
            } catch (error) {
                errorMessage.textContent = error.message;
                errorSection.classList.remove('hidden');
            } finally {
                loadingSection.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        // Copy to clipboard
        copyBtn.addEventListener('click', async () => {
            try {
                // Try modern Clipboard API first
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(extractedText);
                    copyBtn.textContent = 'Copied!';
                    setTimeout(() => {
                        copyBtn.textContent = 'Copy to Clipboard';
                    }, 2000);
                } else {
                    // Fallback to older method
                    const textArea = document.createElement('textarea');
                    textArea.value = extractedText;
                    textArea.style.position = 'fixed';
                    textArea.style.left = '-999999px';
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        copyBtn.textContent = 'Copied!';
                        setTimeout(() => {
                            copyBtn.textContent = 'Copy to Clipboard';
                        }, 2000);
                    } catch (err) {
                        console.error('Fallback copy failed:', err);
                        copyBtn.textContent = 'Copy Failed';
                        setTimeout(() => {
                            copyBtn.textContent = 'Copy to Clipboard';
                        }, 2000);
                    }
                    document.body.removeChild(textArea);
                }
            } catch (error) {
                console.error('Failed to copy:', error);
                copyBtn.textContent = 'Copy Failed';
                setTimeout(() => {
                    copyBtn.textContent = 'Copy to Clipboard';
                }, 2000);
            }
        });

        // Toggle rendered/raw view
        renderToggle.addEventListener('click', () => {
            isRendered = !isRendered;
            renderToggle.textContent = isRendered ? 'Rendered' : 'Raw';
            displayResult();
        });

        // Toggle show/hide images
        imageToggle.addEventListener('click', () => {
            showImages = !showImages;
            imageToggle.textContent = showImages ? 'Show Images' : 'Hide Images';
            displayResult();
        });

        // Display result based on current toggle states
        function displayResult() {
            if (!extractedText) return;

            console.log('displayResult called - isRendered:', isRendered, 'showImages:', showImages);
            console.log('extractedText length:', extractedText.length);
            console.log('extractedText preview:', extractedText.substring(0, 200));

            let displayContent = extractedText;

            // Decode HTML entities if present
            const textArea = document.createElement('textarea');
            textArea.innerHTML = displayContent;
            displayContent = textArea.value;

            console.log('After HTML decoding, displayContent preview:', displayContent.substring(0, 200));

            if (showImages && uploadedImageData) {
                // Convert image references like "image 1", "image 2", etc. to markdown image syntax
                // This handles patterns like "image 1", "Image 1", "image1", etc.
                displayContent = displayContent.replace(/!?\[?\s*image\s*\d+\s*\]?/gi, (match) => {
                    // Extract the image number
                    const matchLower = match.toLowerCase();
                    const imageNum = matchLower.match(/\d+/)?.[0] || '1';
                    return `
![${match.trim()}](${uploadedImageData})
`;
                });
            } else {
                // Remove markdown image syntax when showImages is false
                // This prevents broken image icons from showing
                displayContent = displayContent.replace(/!\[([^\]]*)\]\([^)]+\)/gi, '$1');
                displayContent = displayContent.replace(/<img[^>]*>/gi, '');
            }

            if (isRendered) {
                console.log('Rendering with markdown-it');
                // Always render with markdown-it (handles both HTML tags and markdown syntax)
                resultText.innerHTML = md.render(displayContent);
                resultText.classList.remove('whitespace-pre-wrap');
                resultText.classList.add('prose', 'max-w-none');
                
                // Add styling to images
                resultText.querySelectorAll('img').forEach(img => {
                    img.classList.add('max-w-full', 'h-auto', 'my-4', 'rounded-lg', 'border', 'border-gray-300');
                });
                
                // Apply syntax highlighting to code blocks
                resultText.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            } else {
                console.log('Showing as raw text');
                // Show raw text
                resultText.textContent = displayContent;
                resultText.classList.add('whitespace-pre-wrap');
                resultText.classList.remove('prose', 'max-w-none');
            }
        }
    </script>
</body>
</html>
